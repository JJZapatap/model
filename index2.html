<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor 3D de Sketchfab (URL dinámica)</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1115;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e6e6e6;
      }
      .container { width: min(1100px, 95vw); }
      h1 { font-size: clamp(1.2rem, 2vw, 2rem); margin-bottom: .4rem; }
      p { margin-top: 0; color: #b7bcc7; }
      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: .6rem;
        margin: 1rem 0;
      }
      input, button {
        border-radius: 10px;
        border: 1px solid #303846;
        background: #171c24;
        color: #e6e6e6;
        padding: .75rem .9rem;
        font-size: 1rem;
      }
      button { cursor: pointer; font-weight: 600; }
      button:hover { background: #1f2733; }
      .viewer {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,.35);
      }
      iframe { width: 100%; height: 100%; border: 0; }
      .error { min-height: 1.25rem; color: #ff8d8d; margin: .6rem 0 0; }
      code { background: #1b212c; padding: .15rem .35rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Visor dinámico de modelos de Sketchfab</h1>
      <p>Pega <strong>cualquier URL</strong> de modelo de Sketchfab y presiona <em>Cargar</em>.</p>

      <div class="controls">
        <input
          id="modelUrl"
          type="url"
          placeholder="https://sketchfab.com/3d-models/... o https://sketchfab.com/models/<uid>"
          value="https://sketchfab.com/3d-models/low-poly-car-chevrolet-c10-pickup-1963-679354c151984747bb74310ec5af8995"
        />
        <button id="loadBtn" type="button">Cargar</button>
      </div>

      <div class="viewer">
        <iframe
          id="viewer"
          title="Visor de modelo Sketchfab"
          allowfullscreen
          mozallowfullscreen="true"
          webkitallowfullscreen="true"
          allow="autoplay; fullscreen; xr-spatial-tracking"
          xr-spatial-tracking
          execution-while-out-of-viewport
          execution-while-not-rendered
          web-share>
        </iframe>
      </div>

      <p class="error" id="error"></p>
      <p>
        Formatos soportados: <code>.../3d-models/slug-UID</code>, <code>.../models/UID</code>,
        y URLs con query/hash.
      </p>
    </main>

    <script>
      const input = document.getElementById('modelUrl');
      const button = document.getElementById('loadBtn');
      const iframe = document.getElementById('viewer');
      const error = document.getElementById('error');

      function getEmbedUrl(rawUrl) {
        let url;
        try {
          url = new URL(rawUrl);
        } catch {
          throw new Error('La URL no es válida.');
        }

        if (!url.hostname.includes('sketchfab.com')) {
          throw new Error('La URL debe pertenecer a sketchfab.com');
        }

        const path = url.pathname.replace(/\/+$/, '');
        const uidMatch = path.match(/([a-f0-9]{32})$/i);

        if (!uidMatch) {
          throw new Error('No se encontró el UID del modelo en la URL.');
        }

        const uid = uidMatch[1];
        return `https://sketchfab.com/models/${uid}/embed?autostart=1&ui_theme=dark`;
      }

      function loadModel() {
        error.textContent = '';
        try {
          iframe.src = getEmbedUrl(input.value.trim());
        } catch (err) {
          iframe.removeAttribute('src');
          error.textContent = err.message;
        }
      }

      button.addEventListener('click', loadModel);
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') loadModel();
      });

      loadModel();
    </script>
  </body>
</html>
